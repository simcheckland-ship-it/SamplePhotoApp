name: Deploy API Server Changes

on:
  push:
    branches:
      - main
    paths:
      - "api-server/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: SSH to Proxmox and Deploy API
        env:
          SSH_USER: ${{ secrets.VM1_USER }}
        run: |
          ssh -i /home/github-runner/.ssh/runner-to-vm1 -o StrictHostKeyChecking=no "${{ secrets.VM2_USER }}@192.168.0.201" "
          if [ ! -d \"~/react-photo-app/.git\" ]; then
            echo 'Repository missing or broken. Re-cloning via SSH...' &&
            rm -rf ~/react-photo-app &&
            git clone git@github.com:simcheckland-ship-it/SamplePhotoApp.git ~/react-photo-app
          fi &&
          cd ~/react-photo-app && 
          git clean -fd && 
          git fetch origin main && 
          git reset --hard origin/main && 
          cd api-server && 
          docker compose down && 
          docker compose up -d --build "
        
        
