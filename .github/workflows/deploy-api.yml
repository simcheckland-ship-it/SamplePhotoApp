name: Deploy API Server Changes

on:
  push:
    branches:
      - main
    paths:
      - "api-server/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5 # Automatically cleans and checks out the exact commit

      - name: Copy API Server Files to Proxmox
        run: |
          # 1. Clear the old target folder on Proxmox
          ssh -i /home/github-runner/.ssh/runner-to-vm1 -o StrictHostKeyChecking=no "${{ secrets.VM2_USER }}@192.168.0.201" "rm -rf ~/react-photo-app/api-server"

          # 2. Copy the entire PhotoWepApi folder over safely (Note: NO trailing slash or asterisk on the source)
          scp -i /home/github-runner/.ssh/runner-to-vm1 -o StrictHostKeyChecking=no -r api-server/PhotoWepApi ${{ secrets.VM2_USER }}@192.168.0.201:~/react-photo-app/api-server

      - name: Remote Restart via SSH
        run: |
          # Remotely trigger Docker inside the target folder without checking out Git on the server
          ssh -i /home/github-runner/.ssh/runner-to-vm1 -o StrictHostKeyChecking=no "${{ secrets.VM2_USER }}@192.168.0.201" "
            cd ~/react-photo-app/api-server && 
            docker compose down &&
            docker compose up -d --build
          "
