name: Deploy React Frontend

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/deploy-app.yml"

jobs:
  deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Copy App Deployment and Code to vm0
        run: |
          # 1. Clear out the old directory using sudo privileges
          ssh -i /home/github-runner/.ssh/runner-to-vm0 -o StrictHostKeyChecking=no "${{ secrets.VM0_USER }}@${{ secrets.VM0_HOST }}" "rm -rf /opt/react-app"

          # 2. Re-create the folder using sudo and hand ownership to your deployment user
          ssh -i /home/github-runner/.ssh/runner-to-vm0 -o StrictHostKeyChecking=no "${{ secrets.VM0_USER }}@${{ secrets.VM0_HOST }}" "
            mkdir -p /opt/react-app && 
            chown -R ${{ secrets.VM0_USER }}:${{ secrets.VM0_USER }} /opt/react-app
          "

          # 3. Now scp will copy successfully because your user owns the folder
          scp -i /home/github-runner/.ssh/runner-to-vm0 -o StrictHostKeyChecking=no -r app1/PhotoGlobe ${{ secrets.VM0_USER }}@${{ secrets.VM0_HOST }}:/opt/react-app/


      - name: Build and Run React Container on vm0
        run: |
          # 4. Step inside the deployment directory and build the stack
          ssh -i /home/github-runner/.ssh/runner-to-vm0 -o StrictHostKeyChecking=no "${{ secrets.VM0_USER }}@${{ secrets.VM0_HOST }}" "
            cd /opt/react-app && 
            docker compose down --volumes --remove-orphans && 
            docker compose up -d --build
          "
