name: Deploy React Frontend via GHCR

on:
  push:
    branches:
      - main
    paths:
      - "app1/**"
      - ".github/workflows/deploy-app.yml"

jobs:
  build-and-push:
    runs-on: [self-hosted, linux]
    # Grants security permissions to write images back to your GitHub package registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}          # Resolves to your GitHub username dynamically
          password: ${{ secrets.GITHUB_TOKEN }}  # Built-in temporary token generated by GitHub

       # 3. Build and push using native, reliable host shell execution
      - name: Build and Push Docker Image
        run: |
          # 1. Force Docker to target the exact file path and use app1 as context
          docker build \
            -f /home/github-runner/actions-runner/_work/SamplePhotoApp/SamplePhotoApp/app1/DockerFile \
            -t ghcr.io/${{ github.repository_owner }}/react-app:latest \
            /home/github-runner/actions-runner/_work/SamplePhotoApp/SamplePhotoApp/app1

          # 2. Push the successfully generated local image up to GHCR
          docker push ghcr.io/${{ github.repository_owner }}/react-app:latest




  deploy-to-vm0:
    needs: build-and-push                        # Only executes if the build successfully uploads
    runs-on: [self-hosted, linux]

    steps:
      - name: Copy Compose Configuration to vm0 Home Directory
        run: |
          # 1. Force create a clean deployment folder inside your standard user home directory
          ssh -i /home/github-runner/.ssh/runner-to-vm1 -o StrictHostKeyChecking=no "${{ secrets.VM0_USER }}@${{ secrets.VM0_HOST }}" "mkdir -p ~/react-app"
          
          # 2. Copy ONLY the thin docker-compose.yml configuration file over your LAN. No raw code!
          scp -i /home/github-runner/.ssh/runner-to-vm1 -o StrictHostKeyChecking=no app1/docker-compose.yml ${{ secrets.VM0_USER }}@${{ secrets.VM0_HOST }}:~/react-app/

      - name: Deploy Pre-built Container over SSH
        run: |
          # 3. Log vm0 into GHCR using your workflow token, pull down the fresh image, and run it
          ssh -i /home/github-runner/.ssh/runner-to-vm1 -o StrictHostKeyChecking=no "${{ secrets.VM0_USER }}@${{ secrets.VM0_HOST }}" "
            cd ~/react-app &&
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin &&
            docker compose pull &&
            docker compose up -d
          "
