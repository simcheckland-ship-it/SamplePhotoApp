name: Deploy Image Server Changes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, windows]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: SSH to Proxmox and Apply Changes
      shell: powershell
      env:
        SSH_USER: ${{ secrets.VM_USER }}
        KEY_PATH: C:\Users\Developer\.ssh\id_ed25519
      run: |
        # Write clean Linux script text directly to a file using pure Unix line ending formatting (LF)
        $linuxScript = "cd ~/react-photo-app && git pull origin main && docker-compose up -d && docker exec photo-nginx nginx -s reload"
        
        # Execute the connection cleanly as an explicit argument parameter string
        ssh -i "$env:KEY_PATH" -o StrictHostKeyChecking=no "${env:SSH_USER}@192.168.0.202" "$linuxScript"
