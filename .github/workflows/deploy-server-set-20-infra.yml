name: "🟢 Deploy/Update Server Set 20 Infrastructure"

on:
  workflow_dispatch:

jobs:
  terraform:
    name: "Run Terraform"
    runs-on: self-hosted

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan
        env:
          # TF_VAR_ tells Terraform to automatically match these to your main.tf variables
          TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_token: ${{ secrets.PROXMOX_TOKEN }}
          TF_VAR_server_passwords: |
            {
              "app-proxy-server" = "${{ secrets.VM20_PASS }}",
              "api-server" = "${{ secrets.VM12_PASS }}",
              "image-server" = "${{ secrets.VM22_PASS }}",
            }

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_token: ${{ secrets.PROXMOX_TOKEN }}
          TF_VAR_server_passwords: |
            {
              "app-proxy-server" = "${{ secrets.VM20_PASS }}",
              "api-server" = "${{ secrets.VM21_PASS }}",
              "image-server" = "${{ secrets.VM22_PASS }}",
            }

      - name: Wait for VMs to Boot
        run: sleep 15

      - name: Run Ansible Configuration Playbook
        run: |
          export ANSIBLE_HOST_KEY_CHECKING=False
          ansible-playbook -i inventory.ini playbook.yml
        working-directory: ./ansible

  call-child-workflows:
    # Calls another YAML file in the same repository
    uses: ./.github/workflows/vm20-deploy-proxy.yml
    with:
      environment: "production" # Passing an input variable
