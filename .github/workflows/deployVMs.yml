name: "Proxmox Terraform Deploy"

on:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    name: "Run Terraform"
    runs-on: self-hosted

    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan
      env:
        # TF_VAR_ tells Terraform to automatically match these to your main.tf variables
        TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
        TF_VAR_proxmox_token: ${{ secrets.PROXMOX_TOKEN }}
        TF_VAR_server_passwords: |
          {
            "app-proxy-server" = "${{ secrets.VM0_PASS }}",
            "api-server" = "${{ secrets.VM1_PASS }}",
            "image-server" = "${{ secrets.VM2_PASS }}",
          }
          
    - name: Terraform Apply
      run: terraform apply -auto-approve
      env:
        TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
        TF_VAR_proxmox_token: ${{ secrets.PROXMOX_TOKEN }}
        TF_VAR_server_passwords: |
          {
            "app-proxy-server" = "${{ secrets.VM0_PASS }}",
            "api-server" = "${{ secrets.VM1_PASS }}",
            "image-server" = "${{ secrets.VM2_PASS }}",
          }

     - name: Run Ansible Configuration Playbook
      run: |
        export ANSIBLE_HOST_KEY_CHECKING=False
        ansible-playbook -i inventory.ini playbook.yml
      working-directory: ./ansible
