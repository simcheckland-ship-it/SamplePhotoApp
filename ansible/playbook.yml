---
- name: Configure Fresh Docker Hosts
  hosts: docker_hosts
  become: yes # Runs commands with sudo privileges

  tasks:
    - name: Ensure system repositories are updated
      apt:
        update_cache: yes
        upgrade: dist

    - name: Ensure Docker service is enabled and running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Test Docker functionality by pulling hello-world
      command: docker run --rm hello-world
      register: docker_test
      changed_when: false

    - name: Show Docker test results
      debug:
        msg: "{{ docker_test.stdout_lines }}"
