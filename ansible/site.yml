---
# 1. Run common base setups across every single machine first
- name: Run Global Base Configuration
  include_playbook: common_setup.yml

# 2. Run proxy configuration ONLY on the proxy group
- name: Trigger Proxy Server Playbook
  include_playbook: proxy_setup.yml
  when: "'app_proxy_server' in groups"

# 3. Run API configuration ONLY on the API group
- name: Trigger API Server Playbook
  include_playbook: api_setup.yml
  when: "'api_server' in groups"
