services:
  webapi:
    container_name: photo-webapi
    build: 
      context: .                        # Look inside the current api/ folder
      dockerfile: Dockerfile 
    ports:
      - "5000:8080" # Maps Proxmox port 5000 to internal .NET 8 container port 8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - Logging__LogLevel__Default=Information
      - Logging__LogLevel__Microsoft.AspNetCore=Information
    restart: always
    
  nginx-proxy:
      container_name: nginx-proxy
      image: nginx:alpine
      ports:
        - "80:80"
      volumes:
        - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      depends_on:
        - dotnet-api
      restart: always
  
