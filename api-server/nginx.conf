server {
    listen 80;
    server_name localhost;

    location / {
        # 'dotnet-api' matches the service name in docker-compose.yml
        proxy_pass         http://webapi:8080; 
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name localhost;

    # SSL Certificate Paths (Points to the internal container volume path)
    ssl_certificate         /etc/nginx/certs/nginx-selfsigned.crt; # Replace with your cert filename
    ssl_certificate_key     /etc/nginx/certs/nginx-selfsigned.key;    # Replace with your key filename

    # Recommended Modern SSL Optimization Settings
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_ciphers             HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass         http://photo-webapi:8080; 
        proxy_http_version 1.1;
        
        # FIX 1: Change $http_host to $host to strip port numbers and send a clean IP/domain
        proxy_set_header   Host $host; 
        
        proxy_set_header   Upgrade $http_upgrade;
        
        # FIX 2: Change "keep-alive" to "upgrade" to allow .NET to negotiate connections properly
        proxy_set_header   Connection "upgrade"; 
        
        proxy_cache_bypass $http_upgrade;
        
        # Explicit proxy pass mapping headers
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
    }
}
