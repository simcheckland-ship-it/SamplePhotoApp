version: '3.8'

services:
  react-app:
    # Docker pulls the pre-built image directly from GitHub's servers
    image: ghcr.io/simcheckland-ship-it/react-app:latest
    container_name: react_frontend
    ports:
      - "3000:80"  # Maps local port 3000 to internal container port 80
    restart: unless-stopped
