

services:
  photo-nginx:
    image: nginx:latest
    container_name: photo-nginx
    ports:
      - "80:80"
    restart: always
    # ==========================================
    # ADD THIS MISSING VOLUMES BLOCK
    # ==========================================
    volumes:
      # 1. Links your custom nginx.conf file into the container's engine path
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      
      # 2. Links your physical photo storage directory into the container path
      - /mnt/vm-photos:/var/www/photo-app/uploads
