version: '3.8'

services:
  reverse-proxy:
    image: nginx:alpine                  # Uses the lightweight, stable Alpine Linux Nginx image
    container_name: nginx_proxy
    ports:
      - "80:80"                          # Exposes HTTP to your network
      - "443:443"                        # Exposes HTTPS to your network
    volumes:
      # Links the nginx.conf file copied by your runner into the container
      - /mnt/certs/nginx-selfsigned.crt:/etc/nginx/certs/nginx-selfsigned.crt:ro
      - /mnt/certs/nginx-selfsigned.key:/etc/nginx/certs/nginx-selfsigned.key:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

