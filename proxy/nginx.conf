events { 
    worker_connections 1024; 
}


http {

     # Define the custom reverse proxy logging format
    log_format proxy_logging '[$time_local] Client: $remote_addr '
                     'RealIP: $http_x_real_ip '
                     'Request: "$request" Status: $status '
                     'Upstream: $upstream_addr '
                     'Upstream_Status: $upstream_status '
                     'Request_Time: $request_time '
                     'Upstream_Response_Time: $upstream_response_time';
     # Define a custom log format that highlights the Referer
    log_format image_security '$remote_addr - [$time_local] "$request" '
                              'Status: $status | Referer: "$http_referer"';
     # IIS W3C Extended Log Format replica
    log_format iis_style '$time_iso8601 $server_addr $request_method $uri '
                     '$args $server_port - $remote_addr $http_user_agent '
                     '$http_referer $status $body_bytes_sent';

    # OPTION A: Route all access logs to standard output (stdout) using the custom format
    access_log /dev/stdout iis_style;
        
    # Define the backend address for your separate core API container
    upstream core_api {
        server 192.168.0.201:443;
    }

     # Define the backend address for your React container
    upstream react_frontend {
        server 192.168.0.200:3000;
    }

    
    upstream image_server {
        server 192.168.0.202:3500;
    }

    # Optional: Redirect HTTP (port 80) to HTTPS
    server {
        listen 80;
        server_name 192.168.0.200;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl;
        
        # Replace this with vm0's actual IP address or local domain name
        server_name 192.168.0.200; 

        # Use /etc/nginx/certs/ inside docker container 
        ssl_certificate /etc/nginx/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/nginx-selfsigned.key;

         # Bbasic encryption protocols
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Block common router exploit paths and return 403 Forbidden
        # Catch .env, .aws, cgi-bin, config files, backups, and PHP info paths
        location ~* /(\.env|\.aws|cgi-bin|conf\.bin|phpinfo|info|_profiler|config\.(json|yaml|yml|xml|ini|js))|\.(env|bak|backup|save) {
            deny all;
        }



         # Routes standard traffic to your React frontend container
        location / {
            proxy_pass http://react_frontend;
            
            # Pass essential headers so the React app understands network context
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }    
        
        # Routes standard API requests (like /api/Photos/...) directly to your API container
        location /api/ {
            proxy_pass https://core_api;
            
            # Pass essential headers so the .NET runtime understands network context
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 1. Force Nginx to match the absolute URL directory path cleanly
        # The ^~ modifier forces Nginx to immediately execute proxy_pass and ignore local directory searches
        location /uploads/ {
            
            valid_referers none blocked 192.168.0.200 192.168.0.157 localhost ~localhost:;
            if ($invalid_referer) {
               return 404;
            }
            
            proxy_pass http://image_server; 
            proxy_set_header X-API-Key "PreventHotLinking";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto "http";
        }



        # Catch-all block for errors or missing routes
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}

