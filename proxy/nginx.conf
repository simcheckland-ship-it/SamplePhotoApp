events { 
    worker_connections 1024; 
}

http {
    # Define the backend address for your separate core API container
    upstream core_api {
        server 192.168.0.201:5000;
    }

    server {
        listen 80;
        
        # Replace this with vm0's actual IP address or local domain name
        server_name 192.168.0.200; 

         # Serve React frontend static files
        location / {
            root /usr/share/nginx/html; # Path to your React build folder
            index index.html index.htm;
            try_files $uri $uri/ /index.html; # Essential for React Router routing
        }
        
        # Routes standard API requests (like /api/Photos/...) directly to your API container
        location /api/ {
            proxy_pass http://core_api;
            
            # Pass essential headers so the .NET runtime understands network context
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Catch-all block for errors or missing routes
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}

